<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0F1B2D"/>

  <!-- Logo: scaled-up version of logo.svg, centered-left -->
  <!-- Original viewBox 0 0 64 64; scale factor ~6.5; positioned at left -->
  <g transform="translate(80, 107) scale(6.5)">
    <rect width="64" height="64" rx="14" fill="#0F1B2D"/>
    <clipPath id="rounded"><rect x="6" y="6" width="52" height="52" rx="11"/></clipPath>
    <g clip-path="url(#rounded)">
      <rect x="6" y="6" width="26" height="52" fill="#1A73E8"/>
      <rect x="32" y="6" width="26" height="52" fill="#E0581E"/>
      <path d="M32 6 C 38 18, 38 46, 32 58 C 26 46, 26 18, 32 6 Z" fill="#0F1B2D"/>
    </g>
    <rect x="24" y="24" width="16" height="16" rx="3" fill="#E8B447" stroke="#0F1B2D" stroke-width="1.5"/>
  </g>

  <!-- Text block on the right -->
  <text x="560" y="290"
        font-family="'Source Han Serif SC', 'Noto Serif CJK SC', 'Songti SC', 'STSong', 'SimSun', serif"
        font-size="220" font-weight="700" fill="#FFFFFF">灼见</text>

  <text x="565" y="370"
        font-family="'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', system-ui, sans-serif"
        font-size="56" font-weight="400" fill="#A8B4C4">比世界快一步</text>

  <!-- Bottom-right URL -->
  <text x="1140" y="600" text-anchor="end"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="28" font-weight="400" fill="#5A6878">www.jiziyi.asia</text>
</svg>
